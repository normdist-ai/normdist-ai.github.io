<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <rect width="720" height="400" fill="#0d1117"/>
  
  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" fill="#58a6ff" font-size="20" font-family="sans-serif" font-weight="bold">AGENTS.md 六层结构</text>
  
  <!-- Layer 1 -->
  <rect x="40" y="60" width="640" height="45" rx="8" fill="#1a1f2e" stroke="#2d333b"/>
  <text x="60" y="88" fill="#7ee787" font-size="14" font-family="monospace" font-weight="bold">① 构建命令</text>
  <text x="280" y="88" fill="#8b949e" font-size="13" font-family="sans-serif">投入产出比最高 · 防止 AI 瞎编命令</text>
  
  <!-- Layer 2 -->
  <rect x="40" y="115" width="640" height="45" rx="8" fill="#1a1f2e" stroke="#2d333b"/>
  <text x="60" y="143" fill="#79c0ff" font-size="14" font-family="monospace" font-weight="bold">② 编码规范</text>
  <text x="280" y="143" fill="#8b949e" font-size="13" font-family="sans-serif">只写 AI 反复犯错的 · Linter 抓到的不写</text>
  
  <!-- Layer 3 -->
  <rect x="40" y="170" width="640" height="45" rx="8" fill="#1a1f2e" stroke="#2d333b"/>
  <text x="60" y="198" fill="#ffa657" font-size="14" font-family="monospace" font-weight="bold">③ 架构规则</text>
  <text x="280" y="198" fill="#8b949e" font-size="13" font-family="sans-serif">画红线 · 哪些东西不能碰</text>
  
  <!-- Layer 4 -->
  <rect x="40" y="225" width="640" height="45" rx="8" fill="#1a1f2e" stroke="#2d333b"/>
  <text x="60" y="253" fill="#d2a8ff" font-size="14" font-family="monospace" font-weight="bold">④ 项目边界</text>
  <text x="280" y="253" fill="#8b949e" font-size="13" font-family="sans-serif">哪些目录关注 · 哪些忽略</text>
  
  <!-- Layer 5 -->
  <rect x="40" y="280" width="640" height="45" rx="8" fill="#1a1f2e" stroke="#2d333b"/>
  <text x="60" y="308" fill="#ff7b72" font-size="14" font-family="monospace" font-weight="bold">⑤ Git 规范</text>
  <text x="280" y="308" fill="#8b949e" font-size="13" font-family="sans-serif">提交格式 · 分支策略 · PR 要求</text>
  
  <!-- Layer 6 -->
  <rect x="40" y="335" width="640" height="45" rx="8" fill="#1a1f2e" stroke="#2d333b"/>
  <text x="60" y="363" fill="#56d364" font-size="14" font-family="monospace" font-weight="bold">⑥ 验证清单</text>
  <text x="280" y="363" fill="#8b949e" font-size="13" font-family="sans-serif">自动检查 · 完成任务前 AI 自动执行</text>
</svg>